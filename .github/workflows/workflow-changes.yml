name: Workflow CI

on:
  push:
    branches-ignore:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/scripts/**"
      - ".github/tests/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/scripts/**"
      - ".github/tests/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci-reusable.yml
