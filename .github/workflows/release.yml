# .github/workflows/release.yml
name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write   # needed to push tags and create releases

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: mypy
        run: uv run mypy dispatch_agents

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: pytest
        run: uv run pytest --cov=dispatch_agents --cov-report=term-missing --ignore=examples

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build wheel and sdist
        run: uv build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    name: Tag & Release
    needs: [lint, typecheck, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can read all tags

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Read version from pyproject.toml
        id: pyproject
        run: |
          VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get latest git tag
        id: latest_tag
        run: |
          TAG=$(git tag --sort=-v:refname | grep '^v' | head -1 || echo "v0.0.0")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if version was bumped
        id: check
        run: |
          CURRENT="v${{ steps.pyproject.outputs.version }}"
          LATEST="${{ steps.latest_tag.outputs.tag }}"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "Version $CURRENT already tagged — skipping release."
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "New version $CURRENT detected (latest tag: $LATEST)."
          fi

      - name: Create git tag
        if: steps.check.outputs.bumped == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.pyproject.outputs.version }}"
          git push origin "v${{ steps.pyproject.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check.outputs.bumped == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.pyproject.outputs.version }}"
          name: "v${{ steps.pyproject.outputs.version }}"
          generate_release_notes: true
          files: dist/*
