# .github/workflows/release.yml
name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version_policy:
    uses: ./.github/workflows/version-policy-reusable.yml

  ci:
    name: CI
    needs: version_policy
    uses: ./.github/workflows/ci-reusable.yml
    with:
      upload_dist_artifact: true

  release:
    name: Tag & Release
    needs: [version_policy, ci]
    if: needs.version_policy.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0   # full history so we can read all tags

      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/

      - name: Create git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.version_policy.outputs.current_tag }}"
          git push origin "${{ needs.version_policy.outputs.current_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: "${{ needs.version_policy.outputs.current_tag }}"
          name: "${{ needs.version_policy.outputs.current_tag }}"
          body_path: RELEASE_NOTES.md
          files: dist/*

  publish:
    name: Publish
    needs: [version_policy, ci, release]
    if: needs.version_policy.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always dist/*
