# .github/workflows/publish.yml
name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  # If using PyPI Trusted Publishing (OIDC), also add:
  # id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel and sdist
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        # If using PyPI Trusted Publishing instead, replace the env block with:
        #   UV_PUBLISH_TRUSTED_PUBLISHING: "true"
        # and set id-token: write in permissions above.
