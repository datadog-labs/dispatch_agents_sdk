# .github/workflows/feature-branch.yml
name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: mypy
        run: uv run mypy dispatch_agents

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install dev dependencies
        run: uv sync --group dev
      - name: pytest
        run: uv run pytest --cov=dispatch_agents --cov-report=term-missing --ignore=examples

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build wheel and sdist
        run: uv build
